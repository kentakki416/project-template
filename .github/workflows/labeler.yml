name: Labeler

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write # ラベルの付与/削除に必要

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true # 同一グループのワークフローが実行中ならキャンセル

jobs:
  label:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Apply labels based on changed paths
        uses: actions/labeler@v5
        with:
          configuration-path: .github/labeler.yml
          sync-labels: true # 変更パスから外れたラベルは自動で外す
