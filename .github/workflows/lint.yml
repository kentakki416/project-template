name: Lint

on:
  # main への push（マージ後）のみ。feature ブランチは pull_request 側で走らせ、
  # push + pull_request が同一 concurrency group に入って相互キャンセルするのを防ぐ。
  push:
    branches: [main]
  # paths フィルタは付けない。required status check にした場合、対象外の変更で
  # skip されると「保留 / 失敗」表示のまま merge がブロックされるため、常に実行して
  # 必ず結果を報告する（lint は turbo の ...[HEAD^] で変更パッケージのみ走り軽量）。
  pull_request:
  workflow_dispatch:

permissions:
  contents: read    

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true # 同一グループのワークフローが実行中ならキャンセル

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # HEAD^とHEADのコミットまで取得

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm' # .pnpm-storeをキャッシュ

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile # pnpm-lock.yamlを固定

      - name: Run lint on changed packages
        run: pnpm turbo run lint --filter="...[HEAD^]" # commitの差分の中で変更されたパッケージとその依存パッケージを対象
